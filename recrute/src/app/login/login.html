<div class="login-container">
  <div class="login-card">
    <div class="logo">
  <img src="icon..png" alt="logo" class="logo-icon">
      <h2>RECRUTE</h2>
    </div>

    

    <form (ngSubmit)="submit()" #f="ngForm">
      <label>Email professionnel</label>
      <input name="email" [(ngModel)]="email" type="email" placeholder="contact@entreprise.fr" required />

      <label>Mot de passe</label>
      <input name="password" [(ngModel)]="password" type="password" placeholder="••••••••" required />

      <div class="forgot">
        <a href="#">Mot de passe oublié ?</a>
      </div>

      <div class="form-error" *ngIf="error">{{ error }}</div>

      <button class="login-btn" type="submit">
        Se connecter →
      </button>
    </form>

    <p class="signup">
      Pas encore de compte ? <a  href="/register">Créer un compte</a>
    </p>
  </div>
</div>
