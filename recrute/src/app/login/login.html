<div class="login-container">
  <div class="login-card">
    <div class="logo">
  <img src="icon..png" alt="logo" class="logo-icon">
      <h2>RECRUTE</h2>
    </div>

    

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <label>Email professionnel</label>
      <input type="email" placeholder="contact@entreprise.fr" formControlName="email" />

      <label>Mot de passe</label>
      <input type="password" placeholder="••••••••" formControlName="password" />

      <div class="forgot">
        <a href="#">Mot de passe oublié ?</a>
      </div>

      <button class="login-btn" type="submit" [disabled]="!loginForm.valid">
        Se connecter →
      </button>
    </form>

    <p class="signup">
      Pas encore de compte ? <a routerLink="/register">Créer un compte</a>
    </p>
  </div>
</div>
