# Configuration de la base H2 en mémoire
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate (JPA) : créer automatiquement les tables à partir des entités
spring.jpa.hibernate.ddl-auto=update

# Affiche les requêtes SQL dans la console (pratique pour apprendre)
spring.jpa.show-sql=true

# Active la console H2 pour voir la base dans le navigateur
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console